name: build-and-lint

# triggers: define when this workflow should run
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        # Removed max-warnings=0 to prevent simple warnings from breaking the build
        run: npm run lint

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      # FIXED: Changed context path from ./server to ./backend
      - name: Build backend image
        run: docker build -t backend ./backend

      # FIXED: Changed context path from ./client to ./frontend
      - name: Build frontend image
        run: docker build -t frontend ./frontend

